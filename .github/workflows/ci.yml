name: "CI: Quality Control"

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Revisión de Python (Backend)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Linting
        run: pip install ruff

      - name: Run Ruff (Lint & Format)
        run: ruff check backend/ && ruff format --check backend/

      # 2. Revisión de React (Frontend)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Deps
        run: cd frontend && npm ci

      - name: Run ESLint
        run: cd frontend && npm run lint

      # 3. Validación de Infraestructura (Terraform)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format & Validate
        run: |
          cd infra/environments/dev
          terraform init -backend=false
          terraform fmt -check
          terraform validate
