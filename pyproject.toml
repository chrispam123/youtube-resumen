
[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP"]
ignore = [
  "E501",  # líneas largas — ruff-format ya se encarga de esto
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["E402"]  # permite imports después de os.environ en tests

[tool.ruff.lint.isort]
known-first-party = ["handlers", "fargate"]

[tool.pytest.ini_options]
testpaths = ["backend"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
pythonpath = ["."]
